<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Astronomy Explorer</title>
        <link rel="icon" href="favicon.ico" />

        <!-- Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@300;400;600&display=swap"
            rel="stylesheet">

        <!-- Styles -->
        <link rel="stylesheet" href="styles/main.css" />

        <!-- Scripts -->
        <script type="module" src="./scripts/main.mjs" defer></script>
    </head>

    <body>
        <header class="navbar">
            <div class="logo">
                <img src="images/logo.png" alt="Astronomy Explorer Logo">
                <span>Astronomy Explorer</span>
            </div>

            <div class="header-search">
                <input type="text" id="global-search" placeholder="Search the cosmos..." />
                <button id="global-search-btn">⌕</button>
            </div>

            <button id="theme-toggle">☼</button>

            <nav class="nav-menu">
                <button id="menu-toggle">☰</button>
                
                <div id="side-menu" class="side-menu">
                    <button id="close-menu" class="close-btn">✖</button>
                    <a href="index.html" class="nav-side active">Home</a>
                    <a href="search.html" class="nav-side">Search</a>
                    <a href="favorites.html" class="nav-side">Favorites</a>
                </div>

                <a href="index.html" class="nav-item active">
                    <span class="icon">✦</span>
                    <span class="label">Home</span>
                </a>
                <a href="search.html" class="nav-item">
                    <span class="icon">★</span>
                    <span class="label">Search</span>
                </a>
                <a href="favorites.html" class="nav-item">
                    <span class="icon">✶</span>
                    <span class="label">Favorites</span>
                </a>
            </nav>
        </header>

        <main>
            <section class="apod-section">
                <h2>Astronomy Picture of the Day</h2>
                <div id="apod-container" class="card">
                    <p>Loading...</p>
                </div>
            </section>

            <aside class="side-panel">
                <div class="card" id="visible-tonight">
                    <h3>Visible Tonight</h3>
                    <div id="visible-content">
                        <p>Loading...</p>
                    </div>
                </div>
            </aside>
            
            <section class="sun-section card" id="sun-times">
                <div class="sun-content time-line">
                    <span>Sunrise: <strong class="sunrise"></strong></span>
                    <span>Sunset: <strong class="sunset"></strong></span>
                </div>
                
                <div class="moon-content time-line">
                    <span>Moonrise: <strong class="moonrise"></strong></span>
                    <span>Moonset: <strong class="moonset"></strong></span>
                </div>
            </section>

            <section class="gallery-section">
                <div class="gallery-header">
                    <h2>Astronomy Gallery</h2>
                    <button id="refresh-gallery">⟳</button>
                </div>
                <div id="gallery" class="gallery-grid"></div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Astronomy Explorer. All rights reserved.</p>
            <p><a href="https://www.youtube.com" target="_blank">YouTube Video</a> | <a href="https://trello.com/b/Pm0r96Ye/final-project" target="_blank">Trello Board</a></p>
        </footer>

        <div id="modal" class="modal hidden">
            <div class="modal-content">
        
                <span id="close-modal">✖</span>
        
                <button id="prev-btn" class="nav-arrow">◀</button>
                <button id="next-btn" class="nav-arrow">▶</button>
        
                <img id="modal-img">
                <h3 id="modal-title"></h3>
                <p id="modal-desc"></p>
        
            </div>
        </div>
    </body>

</html>
